<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    width="2048"
    height="2048"
    viewBox="0 0 2048 2048"
    xmlns="http://www.w3.org/2000/svg"
    version="1.1">

    <!-- Background -->
    <rect
        x="0"
        y="0"
        width="2048"
        height="2048"
        fill="#0B0B0F" />

    <!-- Main Identity Bar (Civilian) -->
    <rect
        x="864"
        y="512"
        width="160"
        height="1024"
        rx="16"
        fill="#FFFFFF" />

    <!-- Imposter Accent Bar -->
    <rect
        x="1088"
        y="512"
        width="48"
        height="1024"
        rx="12"
        fill="#3B82F6" />

    <!-- Subtle Glow Effect -->
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect
        x="1088"
        y="512"
        width="48"
        height="1024"
        rx="12"
        fill="#3B82F6"
        opacity="0.35"
        filter="url(#glow)" />

</svg>
